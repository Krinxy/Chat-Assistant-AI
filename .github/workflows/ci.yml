name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install lint dependencies
        run: pip install flake8 black

      - name: Run flake8
        run: flake8 backend/ --max-line-length=100 --exclude=backend/.venv,backend/tests

      - name: Run black check
        run: black --check backend/ --line-length=100 --exclude='/(\.venv|tests)/'

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    env:
      MONGODB_URL: mongodb://localhost:27017
      DATABASE_NAME: chat_test
      SECRET_KEY: test-secret-key-for-ci-only
      OPENAI_API_KEY: sk-test
      WEATHER_API_KEY: test
      ENVIRONMENT: testing
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -v --asyncio-mode=auto --tb=short

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r backend/app/ -ll -x backend/app/tests

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t chat-backend:ci .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t chat-frontend:ci .
