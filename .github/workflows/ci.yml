name: ChatBot CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-gate:
    name: Lint Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[development]"

          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

          if [ -f frontend/package-lock.json ] || [ -f frontend/npm-shrinkwrap.json ]; then
            npm --prefix frontend ci
          elif [ -f frontend/package.json ]; then
            npm --prefix frontend install
          fi

      - name: Run Lint and Type Checks
        run: |
          set -euo pipefail

          PYTHON_TARGETS=()
          for target in backend frontend shared tests; do
            if [ -d "$target" ] && find "$target" -type f -name '*.py' | grep -q .; then
              PYTHON_TARGETS+=("$target")
            fi
          done

          if [ "${#PYTHON_TARGETS[@]}" -gt 0 ]; then
            python -m flake8 "${PYTHON_TARGETS[@]}" --max-line-length=140 --exclude=.git,__pycache__,.venv,venv,node_modules,dist,build,.mypy_cache,.pytest_cache
            python -m black --required-version 25.1.0 --check "${PYTHON_TARGETS[@]}" --line-length=140 --exclude '/(\.git|__pycache__|\.venv|venv|node_modules|dist|build|\.mypy_cache|\.pytest_cache)/'
          fi

          if [ -f package.json ]; then
            npm run lint --if-present
            npm run typecheck --if-present
          fi

          if [ -f frontend/package.json ]; then
            npm --prefix frontend run lint --if-present
            npm --prefix frontend run typecheck --if-present
          fi

  bandit-gate:
    name: Bandit Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Security Dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[development]"

      - name: Run Security Gates
        run: |
          set -euo pipefail

          TRACKED_ENV_FILES="$(git ls-files | grep -E '(^|/)\.env(\..+)?$' || true)"
          if [ -n "$TRACKED_ENV_FILES" ]; then
            echo "Tracked .env files detected. Remove them from git and use local .env + CI secrets instead:"
            echo "$TRACKED_ENV_FILES"
            exit 1
          fi

          PYTHON_SECURITY_TARGETS=()
          for target in backend frontend shared; do
            if [ -d "$target" ] && find "$target" -type f -name '*.py' | grep -q .; then
              PYTHON_SECURITY_TARGETS+=("$target")
            fi
          done

          if [ "${#PYTHON_SECURITY_TARGETS[@]}" -eq 0 ]; then
            echo "No Python sources found for Bandit scan."
            exit 0
          fi

          python -m bandit -r "${PYTHON_SECURITY_TARGETS[@]}" -ll -x "tests,backend/tests"

  test-and-build:
    name: Test And Build Gate
    runs-on: ubuntu-latest
    needs: [lint-gate, bandit-gate]
    permissions:
      contents: read
    env:
      PYTHON_COVERAGE_MIN: "80"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[development]"

          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

          if [ -f frontend/package-lock.json ] || [ -f frontend/npm-shrinkwrap.json ]; then
            npm --prefix frontend ci
          elif [ -f frontend/package.json ]; then
            npm --prefix frontend install
          fi

      - name: Run Tests and Builds
        run: |
          set -euo pipefail

          if [ -d tests ] && find tests -type f -name '*.py' | grep -q .; then
            PYTHON_COV_TARGETS=()
            for target in backend frontend shared; do
              if [ -d "$target" ] && find "$target" -type f -name '*.py' | grep -q .; then
                PYTHON_COV_TARGETS+=("--cov=$target")
              fi
            done

            if [ "${#PYTHON_COV_TARGETS[@]}" -gt 0 ]; then
              pytest tests -v --asyncio-mode=auto --tb=short "${PYTHON_COV_TARGETS[@]}" --cov-report=term-missing --cov-report=xml --cov-fail-under="${PYTHON_COVERAGE_MIN}"
            else
              pytest tests -v --asyncio-mode=auto --tb=short
            fi
          fi

          if [ -f package.json ]; then
            npm test --if-present
            npm run build --if-present
          fi

          if [ -f frontend/package.json ]; then
            npm --prefix frontend test --if-present
            npm --prefix frontend run build --if-present
          fi
