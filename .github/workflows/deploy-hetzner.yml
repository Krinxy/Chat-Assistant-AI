name: Deploy Frontend to Hetzner

# Builds the frontend and rsyncs the static build to the Hetzner webspace — but only after
# the "ChatBot CI/CD" workflow (Lint/Bandit/Test-And-Build gates) has finished successfully
# on main. Runs entirely on GitHub-hosted runners, no dependency on any local machine.
#
# Requires these repository secrets (see docs/postgres-docker-setup.md deploy section):
#   HETZNER_HOST     - e.g. www693.your-server.de
#   HETZNER_PORT     - e.g. 222
#   HETZNER_USER     - SSH/SFTP user
#   HETZNER_SSH_KEY  - private half of a dedicated deploy keypair (not the account password)

on:
  workflow_run:
    workflows: ["ChatBot CI/CD"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hetzner
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    # Only deploy if this was triggered by a successful CI run (or a manual dispatch).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.HETZNER_PORT }}" "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy dist/ to public_html via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.HETZNER_PORT }}" \
            frontend/dist/ \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:~/public_html/"
