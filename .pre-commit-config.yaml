repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: python -m black --line-length=140
        language: system
        types: [python]

      - id: flake8
        name: flake8
        entry: python -m flake8 --max-line-length=140
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: python -m mypy --ignore-missing-imports
        language: system
        types: [python]
        pass_filenames: false
        args: [backend]

      - id: bandit
        name: bandit
        entry: python -m bandit -r backend frontend -ll -x tests,backend/tests
        language: system
        pass_filenames: false

      - id: frontend-lint
        name: frontend eslint
        entry: npm --prefix frontend run lint
        language: system
        pass_filenames: false
        types_or: [ts, tsx, javascript]
