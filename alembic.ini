# Alembic configuration for the Chat-Assistant-AI backend.
#
# The database URL is intentionally NOT set here. It is resolved at runtime from the
# DATABASE_URL environment variable inside migrations/env.py (default:
# sqlite+aiosqlite:///./auth.db) so the same setup works for dev (SQLite) and prod.

[alembic]
# Migration scripts live next to this file, resolved independently of the working dir.
script_location = %(here)s/migrations

# Make the repo root importable so `backend.app...` resolves when Alembic runs.
prepend_sys_path = .

# Use OS path separators and a UTC, sortable timestamp prefix for new revisions.
path_separator = os

# ── logging ──────────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
