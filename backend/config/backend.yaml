# ── Backend Hyperparameters ────────────────────────────────────────────────────
# Central configuration for all backend components.
# Secret values (OPENAI_API_KEY, OPENAI_BASE_URL, JWT_SECRET, etc.) live in .env — never here.

# ── Auth ──────────────────────────────────────────────────────────────────────
auth:
  password_min_length: 8
  reset_token_minutes: 15
  access_token_expires_minutes: 15   # also overridable via JWT_EXPIRES_MINUTES env var

# ── Rate Limiting (auth endpoints) ────────────────────────────────────────────
rate_limit:
  login_max_attempts: 5
  login_window_seconds: 60
  forgot_password_max_attempts: 3
  forgot_password_window_seconds: 600   # 10 minutes
  reset_password_max_attempts: 5
  reset_password_window_seconds: 60

# ── LLM ───────────────────────────────────────────────────────────────────────
# Credentials (API key + base URL) per provider live in .env, never here:
#   local  → OPENAI_API_KEY / OPENAI_BASE_URL   (self-hosted OpenAI-compatible gateway)
#   gemini → GEMINI_API_KEY / GEMINI_BASE_URL   (Google's OpenAI-compatible endpoint)
llm:
  # Guardrail calls — fast, deterministic No-Thinking model, no reasoning token budget.
  # Always run on the local gateway regardless of the chat provider selected.
  guardrails:
    model: qwen3.5-27b-distilled-no-think
    temperature: 0.1
  # Main chat response generation. `provider` is the default when the client sends none.
  # Its <think>...</think> reasoning is stripped before streaming to the client.
  chat:
    provider: local
    model: qwen3.5-think
    temperature: 0.7
    streaming: true
  # Selectable chat providers exposed to the frontend model switch (the routing hub).
  # A request carrying `provider: <id>` is generated by the matching entry's model.
  providers:
    local:
      label: "Local / Self-Hosted"
      model: qwen3.5-think
    gemini:
      label: "Google Gemini"
      model: gemini-2.5-flash

# ── Guardrails ─────────────────────────────────────────────────────────────────
guardrails:
  input_guard:
    enabled: true
  query_refiner:
    enabled: true
  output_guard:
    enabled: true

# ── API / Server ──────────────────────────────────────────────────────────────
api:
  body_limit_bytes: 1048576        # 1 MB — global limit (upload route is exempt, see main.py)
  max_upload_bytes: 20971520       # 20 MB — per-file cap for POST /api/documents/upload
  hsts_max_age_seconds: 31536000   # 1 year
  max_audio_chunk_bytes: 10485760  # 10 MB — guards against memory exhaustion on WS receive
  ws_auth_timeout_seconds: 10.0    # seconds to wait for auth frame after WS accept
  # Chat rate limiting
  chat_requests_per_minute: 60
  chat_window_seconds: 60
  # Session / context window
  max_context_turns: 10
  persist_token_in_browser: true
  # Input validation
  max_message_length: 4000
  # Rejection messages (read by ChatPipeline via ConfigLoader)
  messages:
    input_rejected: "Request rejected by content policy."
    output_rejected: "I'm unable to provide a response to this query. Please rephrase your question."
  # allowed_origins: overridden by ALLOWED_ORIGINS env var in production
  allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:5174"
    - "http://localhost:5175"

# ── RAG ───────────────────────────────────────────────────────────────────────
rag:
  retriever:
    top_k: 4
    similarity_threshold: 0.3
  chunker:
    chunk_size: 512
    chunk_overlap: 50
  embedder:
    model: all-MiniLM-L6-v2
    dimensions: 384

# ── Transcription ─────────────────────────────────────────────────────────────
transcription:
  speech_cache_ttl_seconds: 20
  receive_poll_ms: 120
  receive_poll_ms_min: 40
  receive_poll_ms_max: 1000
  max_inflight_chunks_min: 1
  max_inflight_chunks_max: 8
  whisper_model: "openai/whisper-large-v3-turbo"
  whisper_model_revision: "main"
  sampling_rate: 16000

# ── Vector DB ─────────────────────────────────────────────────────────────────
vectordb:
  persist_path: "./chroma_db"
  collection_name: "documents"
  distance_metric: "cosine"

# ── Redis ─────────────────────────────────────────────────────────────────────
redis:
  port: 6379
  db: 0
  timeout_seconds: 0.25
  scan_count: 100
