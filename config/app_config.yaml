# Application Configuration

app:
  name: "Chat Assistant AI"
  version: "1.0.0"
  description: "Intelligent AI-powered chat assistant with personalization"
  debug: false

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  reload: false

database:
  name: chat_assistant
  max_connections: 10
  min_connections: 2

auth:
  algorithm: HS256
  access_token_expire_minutes: 60
  refresh_token_expire_days: 7

cors:
  allow_origins:
    - "http://localhost:8501"
    - "http://localhost:3000"
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allow_headers:
    - "*"
  allow_credentials: true

vector_db:
  collection_name: "user_documents"
  persist_directory: "./chroma_data"
  distance_metric: "cosine"

embedding:
  model: "all-MiniLM-L6-v2"
  batch_size: 32

chunking:
  chunk_size: 512
  chunk_overlap: 64

retrieval:
  top_k: 5
  rerank_top_k: 3
  similarity_threshold: 0.5

behavior:
  session_timeout_minutes: 30
  max_events_per_user: 10000

recommendations:
  max_candidates: 50
  max_results: 10
  refresh_interval_hours: 1

notifications:
  max_unread: 100
  smart_notification_interval_hours: 24
