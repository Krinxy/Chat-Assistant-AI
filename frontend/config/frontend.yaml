# ── Frontend Hyperparameters ───────────────────────────────────────────────────
# Central configuration for all frontend behaviour.
# Runtime overrides (VITE_API_URL etc.) live in .env — never here.

# ── Speech / Transcription ────────────────────────────────────────────────────
speech:
  monitor_poll_ms: 180           # how often the audio monitor checks RMS
  rms_threshold: 0.02            # minimum RMS to consider speech activity
  min_segment_ms: 2400           # shortest valid speech segment
  silence_flush_ms: 2200         # flush segment after this much silence
  max_segment_ms: 18000          # hard cap per segment (18 s)
  transcript_animation_step_ms: 58

# ── Auth / Login UI ───────────────────────────────────────────────────────────
auth:
  max_error_message_length: 200  # truncate backend error messages in the UI

# ── API ───────────────────────────────────────────────────────────────────────
api:
  base_url: http://localhost:8000
  timeout_ms: 30000

# ── Chat ──────────────────────────────────────────────────────────────────────
chat:
  # Simulated token-streaming UX timings (ms)
  thinking_delay_ms: 80
  response_start_delay_ms: 620
  token_interval_ms: 68

  models:
    - id: gemini-2.0-flash
      label: Gemini 2.0 Flash
      enabled: true
    - id: gemini-2.5-pro
      label: Gemini 2.5 Pro
      enabled: true

  brainrot:
    default_style: meme67
    enabled_by_default: false

# ── Storage ────────────────────────────────────────────────────────────────────
storage:
  auth_token_key: auth_token
  session_id_key: chat_session_id

# ── Feature Flags ─────────────────────────────────────────────────────────────
feature_flags:
  enable_instafeed: false
  enable_header_story_strip: false
  enable_workspace_newsfeed: false
