[tool.pytest.ini_options]
addopts = "-q --cov=. --cov-report=term-missing --cov-report=xml:coverage/coverage-python.xml"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]

[tool.black]
line-length = 140
target-version = ["py311"]
exclude = "(\\.git|\\.venv|venv|build|dist|node_modules)"

[tool.flake8]
max-line-length = 140
extend-ignore = ["E203", "W503"]
exclude = [".git", "__pycache__", ".venv", "venv", "build", "dist", "node_modules"]

[tool.bandit]
exclude_dirs = [".git", "__pycache__", ".venv", "venv", "build", "dist", "node_modules", "tests"]
skips = ["B101"]

[tool.mypy]
python_version = "3.11"
pretty = true
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = ["build", "dist", "node_modules", "venv", ".venv"]

[tool.chat_assistant]
# Retry policy for API access: at most 3 attempts.
api_retry_max_attempts = 3
# Prefer JSON configs by default; YAML remains supported for edge cases.
prefer_json_config = true
