# SonarCloud configuration
# Project: https://sonarcloud.io
#
# Setup steps:
#   1. Go to https://sonarcloud.io and log in via GitHub
#   2. Import this repository (org: Krinxy)
#   3. Copy the generated SONAR_TOKEN into GitHub repo → Settings → Secrets → Actions
#   4. Update sonar.projectKey and sonar.organization below to match what SonarCloud assigned

sonar.projectKey=Krinxy_Chat-Assistant-AI
sonar.organization=krinxy

sonar.projectName=Chat Assistant AI
sonar.projectVersion=0.1.0

# Source paths (backend Python + frontend TypeScript)
sonar.sources=backend,frontend/src
sonar.tests=tests

# Exclusions — generated files, dependencies, build artifacts
sonar.exclusions=\
  **/node_modules/**,\
  **/.venv/**,\
  **/venv/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/__pycache__/**,\
  **/*.min.js,\
  frontend/public/**

sonar.test.exclusions=tests/**

# Python settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# TypeScript / JavaScript settings
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPaths=frontend/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
